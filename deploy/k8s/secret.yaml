# Create this secret manually before deploying:
#
# kubectl -n marvin create secret generic marvin-secrets \
#   --from-literal=ANTHROPIC_API_KEY='...' \
#   --from-literal=GH_TOKEN='...' \
#   --from-literal=LINEAR_API_KEY='...' \
#   --from-literal=OAUTH2_PROXY_CLIENT_ID='...' \
#   --from-literal=OAUTH2_PROXY_CLIENT_SECRET='...' \
#   --from-literal=OAUTH2_PROXY_COOKIE_SECRET="$(python3 -c 'import os,base64;print(base64.urlsafe_b64encode(os.urandom(32)).decode())')"
#
# This file is a placeholder to document the expected keys.
apiVersion: v1
kind: Secret
metadata:
  name: marvin-secrets
  namespace: marvin
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  GH_TOKEN: "REPLACE_ME"
  LINEAR_API_KEY: "REPLACE_ME"
  OAUTH2_PROXY_CLIENT_ID: "REPLACE_ME"
  OAUTH2_PROXY_CLIENT_SECRET: "REPLACE_ME"
  OAUTH2_PROXY_COOKIE_SECRET: "REPLACE_ME"
