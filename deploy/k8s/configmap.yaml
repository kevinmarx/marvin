apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: marvin
data:
  oauth2-proxy.cfg: |
    provider = "oidc"
    oidc_issuer_url = "https://login.microsoftonline.com/TENANT_ID/v2.0"

    # Security group restriction
    allowed_groups = ["SECURITY_GROUP_ID"]
    oidc_groups_claim = "groups"

    # Network — proxies to marvin dashboard in same pod
    http_address = "0.0.0.0:8080"
    upstreams = ["http://127.0.0.1:7777"]
    redirect_url = "https://CUSTOM_DOMAIN/oauth2/callback"

    # Email — allow all (group membership is the gate)
    email_domains = ["*"]

    # Cookies
    cookie_secure = true
    cookie_httponly = true
    cookie_samesite = "lax"
    cookie_name = "_marvin_auth"

    # Trust forwarded headers from Istio
    reverse_proxy = true
    real_client_ip_header = "X-Forwarded-For"

    # Pass auth info downstream
    set_xauthrequest = true

    # Skip auth for probes
    skip_auth_routes = ["/api/heartbeat", "/ping"]
